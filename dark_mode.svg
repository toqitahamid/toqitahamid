<svg xmlns="http://www.w3.org/2000/svg" width="835" height="435" viewBox="0 0 835 435">
  <!-- Window -->
  <rect width="835" height="435" rx="8" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="835" height="32" rx="8" fill="#161b22"/>
  <rect y="24" width="835" height="8" fill="#161b22"/>
  <line x1="0" y1="32" x2="835" y2="32" stroke="#21262d" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="16" r="5" fill="#ff5f56"/>
  <circle cx="38" cy="16" r="5" fill="#ffbd2e"/>
  <circle cx="56" cy="16" r="5" fill="#27c93f"/>

  <!-- Neural network graphic -->
  <g opacity="0.45">
    <line x1="105" y1="153" x2="90" y2="223" stroke="#58a6ff" stroke-width="1.2"/>
    <line x1="105" y1="153" x2="140" y2="223" stroke="#58a6ff" stroke-width="1.2"/>
    <line x1="105" y1="153" x2="190" y2="223" stroke="#58a6ff" stroke-width="1.2"/>
    <line x1="175" y1="153" x2="90" y2="223" stroke="#58a6ff" stroke-width="1.2"/>
    <line x1="175" y1="153" x2="140" y2="223" stroke="#58a6ff" stroke-width="1.2"/>
    <line x1="175" y1="153" x2="190" y2="223" stroke="#58a6ff" stroke-width="1.2"/>
    <line x1="90" y1="223" x2="105" y2="293" stroke="#58a6ff" stroke-width="1.2"/>
    <line x1="90" y1="223" x2="175" y2="293" stroke="#58a6ff" stroke-width="1.2"/>
    <line x1="140" y1="223" x2="105" y2="293" stroke="#58a6ff" stroke-width="1.2"/>
    <line x1="140" y1="223" x2="175" y2="293" stroke="#58a6ff" stroke-width="1.2"/>
    <line x1="190" y1="223" x2="105" y2="293" stroke="#58a6ff" stroke-width="1.2"/>
    <line x1="190" y1="223" x2="175" y2="293" stroke="#58a6ff" stroke-width="1.2"/>
    <circle cx="105" cy="153" r="5" fill="#58a6ff"/>
    <circle cx="175" cy="153" r="5" fill="#58a6ff"/>
    <circle cx="90" cy="223" r="5" fill="#58a6ff"/>
    <circle cx="140" cy="223" r="6" fill="#58a6ff"/>
    <circle cx="190" cy="223" r="5" fill="#58a6ff"/>
    <circle cx="105" cy="293" r="5" fill="#58a6ff"/>
    <circle cx="175" cy="293" r="5" fill="#58a6ff"/>
  </g>

  <!-- Text content -->
  <g font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14">
    <!-- Header -->
    <text y="70">
      <tspan x="300" fill="#58a6ff" font-weight="bold">toqi</tspan><tspan fill="#6e7681">@</tspan><tspan fill="#58a6ff" font-weight="bold">github</tspan>
    </text>

    <!-- Blinking cursor -->
    <rect x="396" y="57" width="8" height="16" fill="#58a6ff">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Separator -->
    <line x1="300" y1="82" x2="500" y2="82" stroke="#21262d" stroke-width="1"/>

    <!-- Info -->
    <text y="108"><tspan x="300" fill="#79c0ff">role</tspan><tspan x="390" fill="#c9d1d9">ML/AI Researcher</tspan></text>
    <text y="132"><tspan x="300" fill="#79c0ff">build</tspan><tspan x="390" fill="#c9d1d9">Full Stack Engineering</tspan></text>

    <text y="164"><tspan x="300" fill="#79c0ff">langs</tspan><tspan x="390" fill="#c9d1d9">Python · Rust · Go · Swift</tspan></text>
    <text y="188"><tspan x="300" fill="#79c0ff">ml</tspan><tspan x="390" fill="#c9d1d9">PyTorch · LaTeX</tspan></text>
    <text y="212"><tspan x="300" fill="#79c0ff">web</tspan><tspan x="390" fill="#c9d1d9">React · Next.js</tspan></text>
    <text y="236"><tspan x="300" fill="#79c0ff">infra</tspan><tspan x="390" fill="#c9d1d9">Docker</tspan></text>

    <text y="268"><tspan x="300" fill="#79c0ff">site</tspan><tspan x="390" fill="#c9d1d9">toqitahamid.com</tspan></text>

    <!-- Separator 2 -->
    <line x1="300" y1="284" x2="500" y2="284" stroke="#21262d" stroke-width="1"/>

    <!-- Dynamic stats -->
    <text y="308"><tspan x="300" fill="#79c0ff">repos</tspan><tspan x="390" fill="#c9d1d9" id="repos_data">0</tspan></text>
    <text y="332"><tspan x="300" fill="#79c0ff">stars</tspan><tspan x="390" fill="#c9d1d9" id="stars_data">0</tspan></text>
    <text y="356"><tspan x="300" fill="#79c0ff">commits</tspan><tspan x="390" fill="#c9d1d9" id="commits_data">0</tspan></text>
    <text y="380"><tspan x="300" fill="#79c0ff">followers</tspan><tspan x="390" fill="#c9d1d9" id="followers_data">0</tspan></text>
  </g>

  <!-- Color palette -->
  <g transform="translate(300, 406)">
    <rect width="24" height="12" rx="2" fill="#161b22"/>
    <rect x="28" width="24" height="12" rx="2" fill="#ff5f56"/>
    <rect x="56" width="24" height="12" rx="2" fill="#ffbd2e"/>
    <rect x="84" width="24" height="12" rx="2" fill="#27c93f"/>
    <rect x="112" width="24" height="12" rx="2" fill="#58a6ff"/>
    <rect x="140" width="24" height="12" rx="2" fill="#bc8cff"/>
    <rect x="168" width="24" height="12" rx="2" fill="#39d353"/>
    <rect x="196" width="24" height="12" rx="2" fill="#c9d1d9"/>
  </g>
</svg>
