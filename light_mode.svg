<svg xmlns="http://www.w3.org/2000/svg" width="835" height="330" viewBox="0 0 835 330">
  <defs>
    <radialGradient id="glow" cx="660" cy="130" r="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0969da" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0969da" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Window -->
  <rect width="835" height="330" rx="8" fill="#ffffff" stroke="#d0d7de" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="835" height="36" rx="8" fill="#f6f8fa"/>
  <rect y="28" width="835" height="8" fill="#f6f8fa"/>
  <line x1="0" y1="36" x2="835" y2="36" stroke="#d0d7de" stroke-width="1"/>
  <line x1="0" y1="37" x2="835" y2="37" stroke="#0969da" stroke-width="0.5" opacity="0.1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="5.5" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="5.5" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="5.5" fill="#27c93f"/>

  <!-- Tab title -->
  <text x="417" y="23" text-anchor="middle" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="12" fill="#656d76">toqi@github:~</text>

  <!-- Constellation glow -->
  <rect x="520" y="40" width="300" height="200" fill="url(#glow)"/>

  <!-- Constellation -->
  <g>
    <g stroke="#0969da" stroke-width="0.6" opacity="0.08">
      <line x1="620" y1="75" x2="660" y2="92"/>
      <line x1="660" y1="92" x2="712" y2="68"/>
      <line x1="712" y1="68" x2="752" y2="96"/>
      <line x1="752" y1="96" x2="788" y2="72"/>
      <line x1="660" y1="92" x2="642" y2="132"/>
      <line x1="712" y1="68" x2="692" y2="118"/>
      <line x1="642" y1="132" x2="692" y2="118"/>
      <line x1="692" y1="118" x2="738" y2="148"/>
      <line x1="642" y1="132" x2="618" y2="168"/>
      <line x1="642" y1="132" x2="682" y2="174"/>
      <line x1="738" y1="148" x2="770" y2="160"/>
      <line x1="770" y1="160" x2="732" y2="188"/>
      <line x1="682" y1="174" x2="732" y2="188"/>
      <line x1="618" y1="168" x2="682" y2="174"/>
      <line x1="752" y1="96" x2="738" y2="148"/>
    </g>
    <g fill="#0969da">
      <circle cx="620" cy="75" r="2" opacity="0.14"/>
      <circle cx="660" cy="92" r="3" opacity="0.16"/>
      <circle cx="712" cy="68" r="2.5" opacity="0.12"/>
      <circle cx="752" cy="96" r="1.5" opacity="0.1"/>
      <circle cx="788" cy="72" r="2" opacity="0.1"/>
      <circle cx="692" cy="118" r="2" opacity="0.14"/>
      <circle cx="738" cy="148" r="2.5" opacity="0.12"/>
      <circle cx="618" cy="168" r="1.5" opacity="0.1"/>
      <circle cx="682" cy="174" r="2" opacity="0.12"/>
      <circle cx="770" cy="160" r="3" opacity="0.14"/>
      <circle cx="732" cy="188" r="2" opacity="0.1"/>
      <!-- Primary node with pulse -->
      <circle cx="642" cy="132" r="4" opacity="0.18">
        <animate attributeName="opacity" values="0.18;0.06;0.18" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="r" values="4;5.5;4" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- Text content -->
  <g font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace">

    <!-- Prompt -->
    <text y="68" font-size="14">
      <tspan x="40" fill="#1a7f37">$</tspan>
      <tspan fill="#1f2328"> neofetch</tspan>
    </text>
    <rect x="128" y="55" width="8" height="16" fill="#1f2328">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Left column: Profile -->
    <text y="106" font-size="14">
      <tspan x="40" fill="#0969da" font-weight="bold">toqi</tspan><tspan fill="#656d76">@</tspan><tspan fill="#0969da" font-weight="bold">github</tspan>
    </text>
    <line x1="40" y1="118" x2="210" y2="118" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4,3"/>

    <g font-size="13">
      <text y="142"><tspan x="40" fill="#0550ae">role</tspan><tspan x="140" fill="#1f2328">ML/AI Researcher</tspan></text>
      <text y="164"><tspan x="40" fill="#0550ae">build</tspan><tspan x="140" fill="#1f2328">Full Stack Engineering</tspan></text>

      <text y="194"><tspan x="40" fill="#0550ae">langs</tspan><tspan x="140" fill="#1f2328">Python · Rust · Go · Swift</tspan></text>
      <text y="216"><tspan x="40" fill="#0550ae">ml</tspan><tspan x="140" fill="#1f2328">PyTorch · LaTeX</tspan></text>
      <text y="238"><tspan x="40" fill="#0550ae">web</tspan><tspan x="140" fill="#1f2328">React · Next.js</tspan></text>
      <text y="260"><tspan x="40" fill="#0550ae">infra</tspan><tspan x="140" fill="#1f2328">Docker</tspan></text>

      <text y="290"><tspan x="40" fill="#0550ae">site</tspan><tspan x="140" fill="#1f2328">toqitahamid.com</tspan></text>
    </g>

    <!-- Vertical divider -->
    <line x1="440" y1="98" x2="440" y2="300" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- Right column: Stats -->
    <text x="470" y="106" font-size="14" fill="#656d76">github stats</text>
    <line x1="470" y1="118" x2="640" y2="118" stroke="#d0d7de" stroke-width="1" stroke-dasharray="4,3"/>

    <g font-size="13">
      <text y="142"><tspan x="470" fill="#0550ae">repos</tspan><tspan x="580" fill="#1f2328" id="repos_data">62</tspan></text>
      <text y="164"><tspan x="470" fill="#0550ae">stars</tspan><tspan x="580" fill="#1f2328" id="stars_data">11</tspan></text>
      <text y="186"><tspan x="470" fill="#0550ae">commits</tspan><tspan x="580" fill="#1f2328" id="commits_data">2,053</tspan></text>
      <text y="208"><tspan x="470" fill="#0550ae">followers</tspan><tspan x="580" fill="#1f2328" id="followers_data">34</tspan></text>
      <text y="230"><tspan x="470" fill="#0550ae">loc</tspan><tspan x="580" fill="#1f2328" id="loc_data">1,885,523</tspan></text>
    </g>
  </g>

</svg>
